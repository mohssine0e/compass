spring.application.name=compass

# --- Database ---
spring.datasource.url=${COMPASS_DB_URL:jdbc:postgresql://localhost:5432/compass}
spring.datasource.username=${COMPASS_DB_USER:mohssine}
spring.datasource.password=${COMPASS_DB_PASSWORD:}

# --- JPA / Hibernate ---
# Schema is owned by Flyway migrations, never by Hibernate auto-DDL (see CLAUDE.md Section 5).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Server ---
server.port=${COMPASS_PORT:8080}
