spring.application.name=compass

# --- Database ---
spring.datasource.url=${COMPASS_DB_URL:jdbc:postgresql://localhost:5432/compass}
spring.datasource.username=${COMPASS_DB_USER:mohssine}
spring.datasource.password=${COMPASS_DB_PASSWORD:}

# --- JPA / Hibernate ---
# Schema is owned by Flyway migrations, never by Hibernate auto-DDL (see CLAUDE.md Section 5).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Server ---
server.port=${COMPASS_PORT:8080}
# Resume uploads are small; keep a modest ceiling (Phase 6). file-size-threshold >= max-file-size
# keeps the upload entirely in memory (no temp file spooled to disk), so the raw resume — which
# holds personal data — is never written to disk, only parsed and discarded (see retention note).
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
spring.servlet.multipart.file-size-threshold=5MB
# All REST endpoints live under /api so the PWA proxies a single prefix.
server.servlet.context-path=/api

# --- AI voice (provider-agnostic, OpenAI-compatible) ---
# Three free providers with automatic failover: primary, then backup, then tertiary on any
# error/timeout/quota exhaustion — a free-tier daily quota running dry on one provider is a real,
# recurring thing under real testing/usage volume, so a third independent pool buys real headroom
# before the caller has to degrade to a plain-text fallback.
# Only the API keys are secret — set them as env vars; everything else has a default.
# Model IDs change over time — check the provider's current model list and adjust if needed.
compass.ai.timeout-seconds=6
compass.ai.max-tokens=64
# Primary: Groq (free tier, very fast, works out of the box)
compass.ai.primary.base-url=${COMPASS_AI_PRIMARY_BASE_URL:https://api.groq.com/openai/v1}
compass.ai.primary.model=${COMPASS_AI_PRIMARY_MODEL:llama-3.3-70b-versatile}
compass.ai.primary.api-key=${GROQ_API_KEY:}
# Backup: Google Gemini (note: gemini-2.0-flash free tier can return 429 limit:0 —
# switch COMPASS_AI_BACKUP_MODEL to gemini-2.0-flash-lite / gemini-2.5-flash if so)
compass.ai.backup.base-url=${COMPASS_AI_BACKUP_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
compass.ai.backup.model=${COMPASS_AI_BACKUP_MODEL:gemini-2.0-flash}
compass.ai.backup.api-key=${GEMINI_API_KEY:}
# Tertiary: NVIDIA's build.nvidia.com free NIM catalog — a separate quota pool (not a downgrade;
# Nemotron Super is NVIDIA's own reasoning/RAG/tool-calling tune of Llama 3.3, well matched to
# this app's strict-JSON prompting). Reasoning-model output can carry a <think> trace before the
# JSON — AiJsonGenerator strips that before parsing.
compass.ai.tertiary.base-url=${COMPASS_AI_TERTIARY_BASE_URL:https://integrate.api.nvidia.com/v1}
compass.ai.tertiary.model=${COMPASS_AI_TERTIARY_MODEL:nvidia/llama-3.3-nemotron-super-49b-v1.5}
compass.ai.tertiary.api-key=${NVIDIA_API_KEY:}
compass.ai.tertiary.disable-thinking=true
# Free-tier NIM latency for a real outline-sized prompt measured ~39s even with thinking
# disabled — well past the shared 30s generation timeout. Give it real margin; this only
# matters when it's actually reached (both Groq and Gemini already failed), so a slower ceiling
# here doesn't cost anything on the normal, fast path.
compass.ai.tertiary.timeout-seconds-override=75

# --- Resurfacing engine ---
# Bring back an unresolved big idea / stalled roadmap once it's gone untouched this long,
# and don't resurface the same item again within the snooze window.
compass.resurfacing.stale-days=${COMPASS_RESURFACING_STALE_DAYS:3}
compass.resurfacing.snooze-days=${COMPASS_RESURFACING_SNOOZE_DAYS:1}

# --- Search grounding (Phase 7) ---
# Optional. A dedicated search API grounds roadmap generation in real sources — separate from the
# Gemini/Groq chat models. Providers are tried in order with failover: Exa (primary) → Tavily
# (fallback). With no key set, grounding is skipped and generation proceeds ungrounded (no
# failure). One search call per proposal; a TTL cache avoids re-spending quota on repeated goals.
compass.search.exa.base-url=${EXA_API_BASE_URL:https://api.exa.ai}
compass.search.exa.api-key=${EXA_API_KEY:}
compass.search.tavily.base-url=${SEARCH_API_BASE_URL:https://api.tavily.com}
compass.search.tavily.api-key=${SEARCH_API_KEY:}
compass.search.max-results=${COMPASS_SEARCH_MAX_RESULTS:8}
compass.search.cache-ttl-seconds=${COMPASS_SEARCH_CACHE_TTL:3600}

# --- System events (observability) ---
# Keep the operational log a lightweight recent-signal view, not an ever-growing dump:
# a scheduled prune drops events older than the retention window and caps total rows.
compass.events.retention-days=${COMPASS_EVENTS_RETENTION_DAYS:30}
compass.events.max-rows=${COMPASS_EVENTS_MAX_ROWS:1000}
