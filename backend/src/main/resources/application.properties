spring.application.name=compass

# --- Database ---
spring.datasource.url=${COMPASS_DB_URL:jdbc:postgresql://localhost:5432/compass}
spring.datasource.username=${COMPASS_DB_USER:mohssine}
spring.datasource.password=${COMPASS_DB_PASSWORD:}

# --- JPA / Hibernate ---
# Schema is owned by Flyway migrations, never by Hibernate auto-DDL (see CLAUDE.md Section 5).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Server ---
server.port=${COMPASS_PORT:8080}
# Resume uploads are small; keep a modest ceiling (Phase 6). file-size-threshold >= max-file-size
# keeps the upload entirely in memory (no temp file spooled to disk), so the raw resume — which
# holds personal data — is never written to disk, only parsed and discarded (see retention note).
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
spring.servlet.multipart.file-size-threshold=5MB
# All REST endpoints live under /api so the PWA proxies a single prefix.
server.servlet.context-path=/api

# --- AI (provider-agnostic, OpenAI-compatible), two tiers x two providers (Phase 19) ---
# "fast" (tone acknowledgments, clarifying questions, verification checks) and "heavy"
# (outline drafting, module expansion, self-critique) each fail over across their own two
# providers on any error/timeout/quota exhaustion — a free-tier daily quota running dry on one
# provider is a real, recurring thing under real testing/usage volume. Four providers across
# two tiers is the founder's confirmed ceiling, not six providers across three tiers.
# Only the API keys are secret — set them as env vars; everything else has a default.
# Model IDs change over time — check the provider's current model list and adjust if needed.
compass.ai.timeout-seconds=6
compass.ai.max-tokens=64
compass.ai.fast-json-timeout-seconds=12
compass.ai.fast-json-max-tokens=500
compass.ai.generation-timeout-seconds=30
compass.ai.generation-max-tokens=2200
compass.ai.skeleton-timeout-seconds=10
compass.ai.skeleton-max-tokens=300
# Cache outline/flat/module-expansion results (Phase 19), keyed by a hash of their real inputs —
# a bigger quota saver than adding more providers, since a repeated/test generation on the same
# input doesn't re-burn quota at all. 0 disables caching.
compass.ai.generation-cache-ttl-seconds=${COMPASS_AI_GENERATION_CACHE_TTL:3600}

# Shared Gemini base URL — Flash (fast tier) and Pro (heavy tier) are the same API/key but
# genuinely separate quota pools, addressed here purely by model name.
compass.ai.gemini-base-url=${COMPASS_AI_GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}

# --- fast tier: Groq (primary), Gemini Flash (backup) ---
compass.ai.fast[0].name=groq
compass.ai.fast[0].base-url=${COMPASS_AI_FAST_PRIMARY_BASE_URL:https://api.groq.com/openai/v1}
compass.ai.fast[0].model=${COMPASS_AI_FAST_PRIMARY_MODEL:llama-3.3-70b-versatile}
compass.ai.fast[0].api-key=${GROQ_API_KEY:}
# gemini-2.0-flash free tier can return 429 limit:0 — switch COMPASS_AI_GEMINI_FLASH_MODEL to
# gemini-2.0-flash-lite / gemini-2.5-flash if so.
compass.ai.fast[1].name=gemini-flash
compass.ai.fast[1].base-url=${compass.ai.gemini-base-url}
compass.ai.fast[1].model=${COMPASS_AI_GEMINI_FLASH_MODEL:gemini-2.0-flash}
compass.ai.fast[1].api-key=${GEMINI_API_KEY:}

# --- heavy tier: Gemini Pro (primary), NVIDIA NIM (backup/last-resort) ---
compass.ai.heavy[0].name=gemini-pro
compass.ai.heavy[0].base-url=${compass.ai.gemini-base-url}
compass.ai.heavy[0].model=${COMPASS_AI_GEMINI_PRO_MODEL:gemini-2.5-pro}
compass.ai.heavy[0].api-key=${GEMINI_API_KEY:}
# Pro is a deeper-reasoning, lower-daily-quota model — reserve it for generation-weight calls,
# and give it a bit more time than a fast-tier call gets, since it's already the "take it slow
# and get it right" tier before NVIDIA is even tried.
compass.ai.heavy[0].timeout-seconds-override=40
# NVIDIA's build.nvidia.com free NIM catalog — a separate quota pool from Gemini entirely (not
# a downgrade; Nemotron Super is NVIDIA's own reasoning/RAG/tool-calling tune of Llama 3.3, well
# matched to this app's strict-JSON prompting), tried only once Gemini Pro also fails. Reasoning-
# model output can carry a <think> trace before the JSON — AiJsonGenerator strips that before
# parsing.
compass.ai.heavy[1].name=nvidia
compass.ai.heavy[1].base-url=${COMPASS_AI_NVIDIA_BASE_URL:https://integrate.api.nvidia.com/v1}
compass.ai.heavy[1].model=${COMPASS_AI_NVIDIA_MODEL:nvidia/llama-3.3-nemotron-super-49b-v1.5}
compass.ai.heavy[1].api-key=${NVIDIA_API_KEY:}
compass.ai.heavy[1].disable-thinking=true
# Free-tier NIM latency for a real outline-sized prompt measured ~39s even with thinking
# disabled — well past the shared 30s generation timeout. Give it real margin; this only
# matters when it's actually reached (Gemini Pro already failed), so a slower ceiling here
# doesn't cost anything on the normal, fast path.
compass.ai.heavy[1].timeout-seconds-override=75

# --- Resurfacing engine ---
# Bring back an unresolved big idea / stalled roadmap once it's gone untouched this long,
# and don't resurface the same item again within the snooze window.
compass.resurfacing.stale-days=${COMPASS_RESURFACING_STALE_DAYS:3}
compass.resurfacing.snooze-days=${COMPASS_RESURFACING_SNOOZE_DAYS:1}

# --- Search grounding (Phase 7) ---
# Optional. A dedicated search API grounds roadmap generation in real sources — separate from the
# Gemini/Groq chat models. Providers are tried in order with failover: Exa (primary) → Tavily
# (fallback). With no key set, grounding is skipped and generation proceeds ungrounded (no
# failure). One search call per proposal; a TTL cache avoids re-spending quota on repeated goals.
compass.search.exa.base-url=${EXA_API_BASE_URL:https://api.exa.ai}
compass.search.exa.api-key=${EXA_API_KEY:}
compass.search.tavily.base-url=${SEARCH_API_BASE_URL:https://api.tavily.com}
compass.search.tavily.api-key=${SEARCH_API_KEY:}
compass.search.max-results=${COMPASS_SEARCH_MAX_RESULTS:8}
compass.search.cache-ttl-seconds=${COMPASS_SEARCH_CACHE_TTL:3600}
# Of those results, only the top N (already relevance-ordered) are spent as prompt context
# (Phase 19) — resource discovery still reads the full max-results set for real URLs.
compass.search.max-context-snippets=${COMPASS_SEARCH_MAX_CONTEXT_SNIPPETS:5}

# --- System events (observability) ---
# Keep the operational log a lightweight recent-signal view, not an ever-growing dump:
# a scheduled prune drops events older than the retention window and caps total rows.
compass.events.retention-days=${COMPASS_EVENTS_RETENTION_DAYS:30}
compass.events.max-rows=${COMPASS_EVENTS_MAX_ROWS:1000}
